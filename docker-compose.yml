services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dossier
      POSTGRES_USER: dossier
      POSTGRES_PASSWORD: dossier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - dossier
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dossier -d dossier']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - dossier
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  dossier:
    driver: bridge
